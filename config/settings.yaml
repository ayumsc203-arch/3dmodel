# Global Settings for Hand Tracking 3D VFX System

camera:
  device_index: 0
  width: 1280
  height: 720
  fps: 60
  mirror: true
  flip_vertical: true

tracking:
  max_num_hands: 2
  min_detection_confidence: 0.7
  min_tracking_confidence: 0.7
  smoothing:
    enabled: true
    # One Euro Filter parameters
    min_cutoff: 0.8       # Minimum cutoff frequency (lower = less jitter)
    beta: 0.02           # Speed coefficient (higher = less lag during fast motion)
    d_cutoff: 1.0        # Cutoff frequency for derivative

rendering:
  window_width: 1280
  window_height: 720
  vsync: true
  bloom:
    enabled: true
    threshold: 0.7       # Threshold above which pixels contribute to bloom
    blur_iterations: 4   # Number of Gaussian blur passes
    intensity: 1.2       # Scale factor for bloom overlay
  tonemapping:
    exposure: 1.0        # Linear camera exposure scale
    gamma: 2.2           # Gamma correction exponent

particles:
  max_particles: 3000    # Maximum dynamic particles active on GPU
  gravity: [0.0, -1.5, 0.0]  # Gravity vector for particle simulation

vfx:
  default_effect: "orchid"
  effects_list:
    - name: "orchid"
      model_path: "assets/models/orchid.obj"
      color: [0.9, 0.4, 0.6]  # Orchid pink
    - name: "wing"
      model_path: "assets/models/wing.obj"
      color: [1.0, 0.2, 0.1]  # Flame red
    - name: "butterfly"
      model_path: "assets/models/butterfly.obj"
      color: [0.1, 0.6, 1.0]  # Electric blue
    - name: "phoenix"
      model_path: "assets/models/phoenix.obj"
      color: [1.0, 0.6, 0.1]  # Flame orange
    - name: "dragon"
      model_path: "assets/models/dragon.obj"
      color: [0.3, 0.05, 0.4]  # Deep violet
    - name: "energy_ball"
      model_path: "assets/models/sphere.obj"
      color: [0.0, 0.9, 1.0]  # Cyan plasma
